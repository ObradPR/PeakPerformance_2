<div class="my-backdrop"></div>
<section class="my-modal md">
    <div class="my-modal-header">
        <h3>How To</h3>
        <i class="fa-solid fa-circle-xmark" (click)="closeModal()"></i>
    </div>

    <div class="position-relative">
        <div class="my-modal-body">
            @if (exercise) {
                <div class="d-flex flex-column">
                    <h4>{{ exercise.name }}</h4>

                    <div class="d-flex flex-wrap mb-3">
                        <app-short-info-stats 
                            [name]="'Body Parts'"
                            [value]="exercise.bodyPart"/>

                        <app-short-info-stats 
                            [name]="'Equipments'"
                            [value]="exercise.equipmentName"/>

                        <app-short-info-stats 
                            [name]="'Muscles'"
                            [value]="muscles"/>
                    </div>
            
                    @if (exercise.apiExerciseId || exercise.pictureUrl) {
                        <img 
                            class="exercise-gif mx-auto" 
                            [src]="exercise.apiExerciseId ? ('https://static.exercisedb.dev/media/' + exercise.apiExerciseId + '.gif') : exercise.pictureUrl" 
                            [alt]="exercise.name"/>
                    }
                    @else {
                        <div class="mx-auto exercise-icon d-flex justify-content-center align-items-center">
                            <i class="fa fa-dumbbell"></i>
                        </div>
                    }
        
                    <div class="mt-3">
                        @for (step of exercise.instructions; track $index; let idx = $index) {
                            <div class="mb-2 d-flex align-items-start">
                                <i class="fa-solid fa-caret-right me-2 mt-1"></i>
                                <small>{{ step.replace('Step:', '').replace(`${idx + 1}`, '') }}</small>
                            </div>
                        }
                    </div>
                </div>
            }
        </div>
    </div>

    <div class="my-modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Close</button>
    </div>
</section>
