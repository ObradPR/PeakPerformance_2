<table class="data-table">
  <thead>
      <tr >
          <th style="width: 100px;">Id</th>
          <th style="width: 300px;">Api Id</th>
          <th>Name</th>
          <th class="text-center" style="width: 100px;">Edit</th>
      </tr>
  </thead>
  <tbody>
      <tr [formGroup]="form">
        <td>
          <input type="number" class="form-control" id="id" placeholder="1" formControlName="id" />
        </td>
        <td colspan="2">
          <input type="search" class="form-control" id="search" placeholder="Search..." formControlName="search" />
        </td>
      </tr>
      @for (exercise of exercises.data; track $index; let idx = $index) {
          <tr [ngClass]="{'odd-row': idx % 2 !== 0}">
              <td>{{ exercise.id }}</td>
              <td>{{ exercise.apiExerciseId }}</td>
              <td>{{ exercise.name }}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-primary"
                  (click)="onEditExercise(exercise)">
                  <i class="fa-solid fa-pen-to-square"></i> Edit
                </button>
              </td>
          </tr>
      }
  </tbody>
</table>
<div class="flex justify-content-center">
    <p-paginator (onPageChange)="onPageChange($event)" 
        [first]="first" 
        [rows]="rows" 
        [totalRecords]="exercises.total"
        [showFirstLastIcon]="false" />
</div>
<div class="text-end">
  <button class="btn btn-success" (click)="modalService.showAdminExerciseCreateModal()">
    <i class="fa-solid fa-plus"></i> New
  </button>
</div>
